# ---------------------------------------------------------------
# CenterPoint + RadarXFormer Fusion
#
# Uses OFFICIAL CenterPoint features (512-dim learned per-object
# embeddings) from the NuScenes-QA repo as primary visual input,
# fused with our RadarXFormer features (48-dim) via cross-modal
# attention.
#
# Expected: 59.5% from CenterPoint alone, 60%+ with RadarXF fusion
# ---------------------------------------------------------------

MODEL_USE: mcan
VISUAL_FEATURE: centerpoint_fusion

# CenterPoint features: per-object 512-dim embeddings + 7-dim bbox
# Padded to 100 objects max
OBJ_FEAT_SIZE: [100, 512]
BBOX_FEAT_SIZE: [100, 48]

# Network — match official MCAN baseline
LAYER: 6
HIDDEN_SIZE: 512
BBOXFEAT_EMB_SIZE: 512
FF_SIZE: 2048
MULTI_HEAD: 8
DROPOUT_R: 0.1
FLAT_MLP_SIZE: 512
FLAT_GLIMPSES: 1
FLAT_OUT_SIZE: 1024
USE_BBOX_FEAT: False
BBOX_NORMALIZE: False

# Training recipe — match official paper
BATCH_SIZE: 32
LR_BASE: 0.0001
LR_DECAY_R: 0.2
LR_DECAY_LIST: [10, 12]
WARMUP_EPOCH: 3
MAX_EPOCH: 13
GRAD_NORM_CLIP: -1
GRAD_ACCU_STEPS: 4
LOSS_FUNC: ce
LOSS_REDUCTION: sum
OPT: Adam
OPT_PARAMS: {betas: '(0.9, 0.98)', eps: '1e-9'}

# Fusion-specific
COUNT_LOSS_WEIGHT: 0.5
LABEL_SMOOTHING: 0.1
CROSS_MODAL_LAYERS: 2
USE_YOLO_DETECTION: False
FUSE_RADAR_DATA: False

# Question-type loss weighting
USE_QTYPE_WEIGHTS: True

# RadarXFormer settings
USE_CLIP_FEATURES: True
USE_SPATIAL_PE: False
REFINEMENT_ITERATIONS: 0
