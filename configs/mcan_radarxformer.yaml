# ---------------------------------------------------------------
# RadarXFormer V2 — Fixed Feature Extraction + Simplified Model
# Uses (100, 48) features: 16-dim structured + 32-dim CLIP visual
# Fixes: expanded categories, full PCA, pre-normalized CLIP
# ---------------------------------------------------------------

MODEL_USE: mcan
VISUAL_FEATURE: radarxf

# Feature sizes — (100, 48) from radarxformer v2 feature extractor
OBJ_FEAT_SIZE: [100, 48]
BBOX_FEAT_SIZE: [100, 4]

# Match annotation model architecture (proven 62% accuracy)
LAYER: 3
HIDDEN_SIZE: 256
BBOXFEAT_EMB_SIZE: 256
FF_SIZE: 1024
MULTI_HEAD: 8
DROPOUT_R: 0.15
FLAT_MLP_SIZE: 256
FLAT_GLIMPSES: 3
FLAT_OUT_SIZE: 512
USE_BBOX_FEAT: False
BBOX_NORMALIZE: False

# --- TRAINING RECIPE (matches annotation model) ---
BATCH_SIZE: 32
LR_BASE: 0.00015
WARMUP_EPOCH: 4
LR_DECAY_R: 0.2
LR_DECAY_LIST: [10, 15]
MAX_EPOCH: 20
EARLY_STOP_PATIENCE: 10
GRAD_NORM_CLIP: 0.5
GRAD_ACCU_STEPS: 1
LOSS_FUNC: ce
LOSS_REDUCTION: sum
OPT: Adam
OPT_PARAMS: {betas: '(0.9, 0.98)', eps: '1e-9', weight_decay: '0.0001'}

# RadarXFormer-specific settings
LABEL_SMOOTHING: 0.1
COUNT_LOSS_WEIGHT: 0.0
CROSS_MODAL_LAYERS: 0
USE_YOLO_DETECTION: False
FUSE_RADAR_DATA: False

# Architecture options (simplified — no extra modules)
REFINEMENT_ITERATIONS: 0
USE_SPATIAL_PE: False
USE_CLIP_FEATURES: True
