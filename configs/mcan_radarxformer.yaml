# ---------------------------------------------------------------
# RadarXFormer-Inspired VQA Config
# Uses (100, 32) features: 16-dim structured + 16-dim CLIP visual
# Adapted from RadarXFormer (2603.14822v1) fusion principles
# ---------------------------------------------------------------

MODEL_USE: mcan
VISUAL_FEATURE: radarxf

# Feature sizes — (100, 32) from radarxformer feature extractor
OBJ_FEAT_SIZE: [100, 32]
BBOX_FEAT_SIZE: [100, 4]

# Larger model to leverage richer features
LAYER: 4
HIDDEN_SIZE: 384
BBOXFEAT_EMB_SIZE: 384
FF_SIZE: 1536
MULTI_HEAD: 8
DROPOUT_R: 0.15
FLAT_MLP_SIZE: 384
FLAT_GLIMPSES: 3
FLAT_OUT_SIZE: 768
USE_BBOX_FEAT: False
BBOX_NORMALIZE: False

# --- TRAINING RECIPE ---
BATCH_SIZE: 32
LR_BASE: 0.00012
WARMUP_EPOCH: 3
LR_DECAY_R: 0.2
LR_DECAY_LIST: [10, 15]
MAX_EPOCH: 25
EARLY_STOP_PATIENCE: 8
GRAD_NORM_CLIP: 0.5
GRAD_ACCU_STEPS: 1
LOSS_FUNC: ce
LOSS_REDUCTION: sum
OPT: Adam
OPT_PARAMS: {betas: '(0.9, 0.98)', eps: '1e-9', weight_decay: '0.0005'}

# RadarXFormer-specific settings
LABEL_SMOOTHING: 0.1
COUNT_LOSS_WEIGHT: 0.0
CROSS_MODAL_LAYERS: 0
USE_YOLO_DETECTION: False
FUSE_RADAR_DATA: False

# RadarXFormer architecture options
REFINEMENT_ITERATIONS: 1
USE_SPATIAL_PE: True
USE_CLIP_FEATURES: True
