# ---------------------------------------------------------------
# RadarXF Small: Annotation-Style Architecture on Detected Features
#
# THE MAJOR CHANGE:
# - Drop from 114M params to ~8M params
# - Single stream (RadarXF only, no BEV/LiDAR fusion)
# - 3 layers instead of 6, 256 hidden instead of 512
# - Higher dropout (0.15) for regularization
#
# WHY: The annotation model (6.5M params) gets 71.6% on GT features.
# Our trimodal model (114M params) gets only 56% on detected features.
# The huge model OVERFITS on noisy features. A smaller model should
# generalize better.
#
# RadarXF features (100, 48) contain:
#   - Dims 0-15: Structured (category, attribute, position, velocity)
#   - Dims 16-47: CLIP visual features (semantic appearance)
# This is the RICHEST per-object feature set we have.
# ---------------------------------------------------------------

MODEL_USE: mcan
VISUAL_FEATURE: radarxf

# Feature sizes — RadarXF features: (100, 48)
OBJ_FEAT_SIZE: [100, 48]
BBOX_FEAT_SIZE: [100, 4]

# Small network — matches annotation model architecture
LAYER: 3
HIDDEN_SIZE: 256
BBOXFEAT_EMB_SIZE: 256
FF_SIZE: 1024
MULTI_HEAD: 4
DROPOUT_R: 0.15
FLAT_MLP_SIZE: 256
FLAT_GLIMPSES: 3
FLAT_OUT_SIZE: 512
USE_BBOX_FEAT: False
BBOX_NORMALIZE: False
WORD_EMBED_SIZE: 300

# Single-head, LSTM
USE_DISTILBERT: False
USE_MULTI_HEAD: False

# Training recipe (longer, with more patience for small model)
BATCH_SIZE: 32
LR_BASE: 0.00015
LR_DECAY_R: 0.2
LR_DECAY_LIST: [10, 15]
WARMUP_EPOCH: 4
MAX_EPOCH: 25
GRAD_NORM_CLIP: 0.5
GRAD_ACCU_STEPS: 1
LOSS_FUNC: ce
LOSS_REDUCTION: sum
OPT: Adam
OPT_PARAMS: {betas: '(0.9, 0.98)', eps: '1e-9', weight_decay: '0.0001'}

# RadarXF-specific
LABEL_SMOOTHING: 0.1
COUNT_LOSS_WEIGHT: 0.0
CROSS_MODAL_LAYERS: 0
USE_YOLO_DETECTION: False
FUSE_RADAR_DATA: False
USE_CLIP_FEATURES: True
