# Network
MODEL_USE: mcan
LAYER: 8
HIDDEN_SIZE: 512
BBOXFEAT_EMB_SIZE: 512
FF_SIZE: 2048
MULTI_HEAD: 8
DROPOUT_R: 0.2
FLAT_MLP_SIZE: 512
FLAT_GLIMPSES: 3
FLAT_OUT_SIZE: 1024
USE_BBOX_FEAT: False
BBOX_NORMALIZE: False

# Feature sizes — YOLO: 80 objects × 13 features (10 detection + 3 radar)
OBJ_FEAT_SIZE: [80, 13]
BBOX_FEAT_SIZE: [80, 4]

# Execution
BATCH_SIZE: 16
LR_BASE: 0.0001
LR_DECAY_R: 0.1
LR_DECAY_LIST: [8, 11]
WARMUP_EPOCH: 3
MAX_EPOCH: 22
GRAD_NORM_CLIP: -1
GRAD_ACCU_STEPS: 1
LOSS_FUNC: ce
LOSS_REDUCTION: sum
OPT: Adam
OPT_PARAMS: {betas: '(0.9, 0.98)', eps: '1e-9', weight_decay: '0.0001'}

# YOLO Detection settings
USE_YOLO_DETECTION: False
FUSE_RADAR_DATA: True
DETECTION_CONF_THRESHOLD: 0.25
RADAR_WEIGHT: 1.0
IMAGE_WEIGHT: 1.0
MAX_OBJECTS: 80
BBOX_FEATURE_DIM: 13
