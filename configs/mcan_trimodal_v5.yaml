# ---------------------------------------------------------------
# Trimodal Fusion V5: AdamW + Cosine Annealing + AMP
# Adopts the 3 key improvements from friend's 60%+ exp005 code:
#   1. AdamW optimizer (proper weight decay decoupling)
#   2. Cosine annealing LR (smoother optimization landscape)
#   3. Mixed precision training (faster + regularization effect)
# Architecture: same proven 18.7M param V1 model
# ---------------------------------------------------------------

MODEL_USE: mcan
VISUAL_FEATURE: trimodal_fusion

# Feature sizes (same as v1)
OBJ_FEAT_SIZE: [80, 75]
BBOX_FEAT_SIZE: [100, 48]
LIDAR_FEAT_SIZE: [80, 6]
CAMERA_BEV_DIM: 69

# Network — SAME as v1 (proven to generalize)
LAYER: 3
HIDDEN_SIZE: 256
BBOXFEAT_EMB_SIZE: 256
FF_SIZE: 1024
MULTI_HEAD: 8
DROPOUT_R: 0.2
FLAT_MLP_SIZE: 256
FLAT_GLIMPSES: 3
FLAT_OUT_SIZE: 512
USE_BBOX_FEAT: False
BBOX_NORMALIZE: False

# NEW: AdamW optimizer (proper weight decay)
OPT: AdamW
OPT_PARAMS: {betas: '(0.9, 0.98)', eps: '1e-9', weight_decay: '0.01'}

# NEW: Cosine Annealing LR schedule
LR_SCHEDULE: cosine
LR_BASE: 0.0003
LR_MIN: 0.000001
WARMUP_EPOCH: 4
MAX_EPOCH: 25
LR_DECAY_LIST: []
LR_DECAY_R: 0.2

# NEW: Mixed Precision Training
USE_AMP: True

# Training recipe
BATCH_SIZE: 32
EARLY_STOP_PATIENCE: 12
GRAD_NORM_CLIP: 0.5
GRAD_ACCU_STEPS: 1
LOSS_FUNC: ce
LOSS_REDUCTION: sum

# Fusion-specific
COUNT_LOSS_WEIGHT: 0.5
LABEL_SMOOTHING: 0.1
CROSS_MODAL_LAYERS: 2
USE_YOLO_DETECTION: False
FUSE_RADAR_DATA: False

# Question-type loss weighting (proven in v3)
USE_QTYPE_WEIGHTS: True

# RadarXFormer settings
USE_CLIP_FEATURES: True
USE_SPATIAL_PE: False
REFINEMENT_ITERATIONS: 0
