# ---------------------------------------------------------------
# Detection-Based VQA Config V2 (Camera + Radar)
# Improvements:
#   - Transfer learning from annotation model (CKPT_PATH)
#   - Feature augmentation during training
#   - Larger model capacity (4 layers)
# ---------------------------------------------------------------

MODEL_USE: mcan
VISUAL_FEATURE: detected

# Feature sizes — same (100, 16)
OBJ_FEAT_SIZE: [100, 16]
BBOX_FEAT_SIZE: [100, 4]

# Slightly larger model (4 layers vs 3) for handling noisy features
LAYER: 4
HIDDEN_SIZE: 256
BBOXFEAT_EMB_SIZE: 256
FF_SIZE: 1024
MULTI_HEAD: 8
DROPOUT_R: 0.2
FLAT_MLP_SIZE: 256
FLAT_GLIMPSES: 3
FLAT_OUT_SIZE: 512
USE_BBOX_FEAT: False
BBOX_NORMALIZE: False

# Training recipe
BATCH_SIZE: 32
LR_BASE: 0.00008
LR_DECAY_R: 0.2
LR_DECAY_LIST: [20, 30]
WARMUP_EPOCH: 3
MAX_EPOCH: 50
EARLY_STOP_PATIENCE: 10
GRAD_NORM_CLIP: 0.5
GRAD_ACCU_STEPS: 1
LOSS_FUNC: ce
LOSS_REDUCTION: sum
OPT: Adam
OPT_PARAMS: {betas: '(0.9, 0.98)', eps: '1e-9', weight_decay: '0.0001'}

# Annotation-style processing
LABEL_SMOOTHING: 0.1
COUNT_LOSS_WEIGHT: 0.0
CROSS_MODAL_LAYERS: 0
USE_YOLO_DETECTION: False
FUSE_RADAR_DATA: False

# V2: Feature augmentation during training
FEAT_AUGMENT: True
FEAT_AUGMENT_NOISE: 0.05
FEAT_AUGMENT_DROP: 0.1
