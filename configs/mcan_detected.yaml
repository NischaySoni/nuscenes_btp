# ---------------------------------------------------------------
# Detected VQA Config (from-scratch training)
# ---------------------------------------------------------------
# For training VQA on detected features (Camera+Radar)

MODEL_USE: mcan
VISUAL_FEATURE: detected

# Feature sizes
OBJ_FEAT_SIZE: [100, 16]
BBOX_FEAT_SIZE: [100, 4]

# Architecture (matches annot_v1 for weight compatibility)
LAYER: 3
HIDDEN_SIZE: 256
BBOXFEAT_EMB_SIZE: 256
FF_SIZE: 1024
MULTI_HEAD: 8
DROPOUT_R: 0.2
FLAT_MLP_SIZE: 256
FLAT_GLIMPSES: 3
FLAT_OUT_SIZE: 512
USE_BBOX_FEAT: False
BBOX_NORMALIZE: False

# --- TRAINING RECIPE ---
BATCH_SIZE: 32
LR_BASE: 0.0001
WARMUP_EPOCH: 3
LR_DECAY_R: 0.2
LR_DECAY_LIST: [8, 14]
MAX_EPOCH: 20
EARLY_STOP_PATIENCE: 10
GRAD_NORM_CLIP: 0.5
GRAD_ACCU_STEPS: 1
LOSS_FUNC: ce
LOSS_REDUCTION: sum
OPT: Adam
OPT_PARAMS: {betas: '(0.9, 0.98)', eps: '1e-9', weight_decay: '0.0005'}

LABEL_SMOOTHING: 0.1
COUNT_LOSS_WEIGHT: 0.0
CROSS_MODAL_LAYERS: 0
USE_YOLO_DETECTION: False
FREEZE_BACKBONE: False
FUSE_RADAR_DATA: False
