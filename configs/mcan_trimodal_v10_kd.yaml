# ---------------------------------------------------------------
# Trimodal Fusion V10: Knowledge Distillation
# 
# Student: Trimodal fusion (BEV + RadarXF + LiDAR)
# Teacher: Annotation model (71% accuracy, ground-truth features)
#
# The teacher provides soft probability targets that encode its
# knowledge about answer distributions, which the student learns
# through KL-divergence minimization.
# ---------------------------------------------------------------

MODEL_USE: mcan
VISUAL_FEATURE: trimodal_fusion

# Feature sizes (student)
OBJ_FEAT_SIZE: [80, 75]
BBOX_FEAT_SIZE: [100, 48]
LIDAR_FEAT_SIZE: [80, 6]
CAMERA_BEV_DIM: 69

# Network (student)
LAYER: 6
HIDDEN_SIZE: 512
BBOXFEAT_EMB_SIZE: 512
FF_SIZE: 2048
MULTI_HEAD: 8
DROPOUT_R: 0.1
FLAT_MLP_SIZE: 512
FLAT_GLIMPSES: 1
FLAT_OUT_SIZE: 1024
USE_BBOX_FEAT: False
BBOX_NORMALIZE: False
WORD_EMBED_SIZE: 300

# Language encoder
USE_DISTILBERT: False
USE_MULTI_HEAD: False

# ★ Knowledge Distillation ★
USE_KD: 'True'
TEACHER_CONFIG: 'configs/mcan_annotation.yaml'
TEACHER_CKPT: './outputs/ckpts/ckpt_annot_new/epoch13.pkl'
TEACHER_FEAT_SHAPE: [100, 16]
KD_ALPHA: 0.3
KD_TEMPERATURE: 3.0

# Training recipe
BATCH_SIZE: 32
LR_BASE: 0.0001
LR_DECAY_R: 0.2
LR_DECAY_LIST: [10, 12]
WARMUP_EPOCH: 3
MAX_EPOCH: 15
GRAD_NORM_CLIP: 1.0
GRAD_ACCU_STEPS: 4
LOSS_FUNC: ce
LOSS_REDUCTION: sum
OPT: Adam
OPT_PARAMS: {betas: '(0.9, 0.98)', eps: '1e-9', weight_decay: '0.0001'}

# Fusion-specific
COUNT_LOSS_WEIGHT: 0.5
LABEL_SMOOTHING: 0.1
CROSS_MODAL_LAYERS: 2
USE_YOLO_DETECTION: False
FUSE_RADAR_DATA: False
USE_QTYPE_WEIGHTS: True

# RadarXFormer settings
USE_CLIP_FEATURES: True
USE_SPATIAL_PE: False
REFINEMENT_ITERATIONS: 0
